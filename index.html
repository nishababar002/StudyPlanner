<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study Planner Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>📚 Planner</h2>
    <ul>
      <li onclick="showAll()">🏠 All Tasks</li>
      <li onclick="showCompleted()">✅ Completed</li>
      <li onclick="showPending()">⏳ Pending</li>
      <li onclick="logout()">🚪 Logout</li>
    </ul>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- HEADER -->
    <div class="header">
      <h1>Dashboard</h1>
    </div>

    <!-- INPUT CARD -->
    <div class="card">
      <input type="text" id="taskInput" placeholder="Enter task">
      <input type="date" id="dateInput">
      <input type="time" id="timeInput">
      <button onclick="addTask()">Add Task</button>
    </div>

    <!-- PROGRESS -->
    <div class="card">
      <h3>Progress</h3>
      <div class="progress-container">
        <div id="progressBar"></div>
      </div>
      <p id="progressText">0%</p>
    </div>

    <!-- CHART -->
    <div class="card">
      <h3>Task Overview</h3>
      <canvas id="taskChart"></canvas>
    </div>

    <!-- TASK LIST -->
    <div class="card">
      <h3>Tasks</h3>
      <ul id="taskList"></ul>
    </div>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
